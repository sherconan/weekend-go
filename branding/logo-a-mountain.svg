<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- A 双峰日出 · 经典进化：延续现有 ⛰️ 心智，圆润双峰 + 太阳 + 出发小路 -->
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#66BB6A"/>
      <stop offset="1" stop-color="#5DADE2"/>
    </linearGradient>
    <clipPath id="clipA"><rect width="1024" height="1024" rx="230"/></clipPath>
  </defs>
  <g clip-path="url(#clipA)">
    <rect width="1024" height="1024" fill="url(#bgA)"/>
    <!-- 太阳光晕 -->
    <circle cx="712" cy="298" r="168" fill="#FFD54F" opacity="0.28"/>
    <circle cx="712" cy="298" r="112" fill="#FFD54F"/>
    <!-- 后峰（右，半透明） -->
    <path d="M 396 1024 L 600 520 Q 638 444 676 520 L 880 1024 Z" fill="#FFFFFF" opacity="0.62"/>
    <!-- 前峰（左，实白） -->
    <path d="M 60 1024 L 312 408 Q 352 326 392 408 L 644 1024 Z" fill="#FFFFFF"/>
    <!-- 小云，配平左上 -->
    <g opacity="0.92" fill="#FFFFFF">
      <circle cx="262" cy="252" r="34"/>
      <circle cx="309" cy="232" r="46"/>
      <circle cx="356" cy="252" r="32"/>
      <rect x="248" y="252" width="140" height="34" rx="17"/>
    </g>
  </g>
</svg>
