<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- D 去哪儿气泡 · 对话气泡和定位 Pin 合体：「去哪儿？」这个问题本身就是产品 -->
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#66BB6A"/>
      <stop offset="1" stop-color="#5DADE2"/>
    </linearGradient>
    <clipPath id="clipD"><rect width="1024" height="1024" rx="230"/></clipPath>
  </defs>
  <g clip-path="url(#clipD)">
    <rect width="1024" height="1024" fill="url(#bgD)"/>
    <!-- 地面投影 -->
    <ellipse cx="512" cy="902" rx="130" ry="26" fill="#1A2332" opacity="0.14"/>
    <!-- 气泡 + 下方收成 Pin 尖（合体形） -->
    <rect x="200" y="180" width="624" height="488" rx="168" fill="#FFFFFF"/>
    <path d="M 386 640 Q 512 706 638 640 L 512 892 Z" fill="#FFFFFF"/>
    <!-- 问号弧 + 竖笔 -->
    <path d="M 404 372 Q 404 256 512 256 Q 620 256 620 360 Q 620 442 542 466 Q 512 476 512 516 L 512 528" fill="none" stroke="#FF7043" stroke-width="62" stroke-linecap="round"/>
    <!-- 问号点 = 金色太阳（目的地） -->
    <circle cx="512" cy="594" r="42" fill="#FFD54F"/>
  </g>
</svg>
