<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- C 周末徽章 · 呼应产品「盖章打卡图鉴」文化，国家公园徽章式 -->
  <defs>
    <path id="arcTopC" d="M 144 512 A 368 368 0 0 1 880 512"/>
    <path id="arcBottomC" d="M 84 512 A 428 428 0 0 0 940 512"/>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="#FAFBF8"/>
  <!-- 外环 -->
  <circle cx="512" cy="512" r="468" fill="#4CAF50"/>
  <!-- 邮票齿孔虚线（贴内盘外圈，避开文字） -->
  <circle cx="512" cy="512" r="352" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-dasharray="3 26" stroke-linecap="round" opacity="0.85"/>
  <!-- 内盘 -->
  <circle cx="512" cy="512" r="330" fill="#FAFBF8"/>
  <!-- 环上文字 -->
  <text font-family="'PingFang SC', sans-serif" font-size="86" font-weight="600" fill="#FFFFFF" letter-spacing="26">
    <textPath href="#arcTopC" startOffset="50%" text-anchor="middle">周末去哪儿</textPath>
  </text>
  <text font-family="'PingFang SC', 'SF Pro Display', sans-serif" font-size="64" font-weight="600" fill="#FFFFFF" letter-spacing="14">
    <textPath href="#arcBottomC" startOffset="50%" text-anchor="middle">WEEKEND GO</textPath>
  </text>
  <!-- 左右分隔金点 -->
  <circle cx="113" cy="512" r="16" fill="#FFD54F"/>
  <circle cx="911" cy="512" r="16" fill="#FFD54F"/>
  <!-- 内盘场景：太阳 + 双峰 + 帐篷 -->
  <circle cx="640" cy="392" r="62" fill="#FFD54F"/>
  <path d="M 430 700 L 560 452 Q 580 414 600 452 L 730 700 Z" fill="#66BB6A"/>
  <path d="M 250 700 L 400 408 Q 422 366 444 408 L 594 700 Z" fill="#4CAF50"/>
  <!-- 帐篷 -->
  <path d="M 580 700 L 652 588 L 724 700 Z" fill="#FF7043"/>
  <path d="M 640 700 L 652 644 L 666 700 Z" fill="#FAFBF8" opacity="0.9"/>
  <!-- 地面线 -->
  <line x1="236" y1="700" x2="788" y2="700" stroke="#4CAF50" stroke-width="18" stroke-linecap="round"/>
</svg>
