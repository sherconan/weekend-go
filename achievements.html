<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>周末去哪儿 · 成就图鉴</title>
  <meta name="description" content="累计打卡 · 连续徽章 · 城市足迹 · 主题达人">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏆%3C/text%3E%3C/svg%3E">
  <style>
    :root{--ink-900:#101828;--ink-700:#344054;--ink-500:#667085;--ink-300:#98A2B3;--bg:#FAFBF8;--surface:#FFFFFF;--surface-2:#F6F8F4;--brand:#4CAF50;--action:#FF7043;--gold:#FFC107;--border:#E8ECF0;--shadow-sm:0 1px 3px rgba(16,24,40,.05);--shadow-md:0 4px 12px rgba(16,24,40,.08);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:"PingFang SC","Inter",-apple-system,sans-serif;background:var(--bg);color:var(--ink-900);line-height:1.5;-webkit-font-smoothing:antialiased;}
    .top-nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;}
    .back-link{color:var(--ink-700);text-decoration:none;font-size:14px;font-weight:600;}

    .container{max-width:920px;margin:0 auto;padding:24px 20px 80px;}
    header{text-align:center;margin-bottom:28px;}
    header h1{font-size:28px;font-weight:800;margin-bottom:6px;}
    header p{color:var(--ink-500);font-size:14px;}

    /* Hero summary */
    .hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
    .hero-stat{background:var(--surface);border-radius:14px;padding:18px 10px;text-align:center;box-shadow:var(--shadow-sm);}
    .hero-stat-num{font-size:28px;font-weight:800;color:var(--action);margin-bottom:2px;}
    .hero-stat-label{font-size:11px;color:var(--ink-500);}

    h2{font-size:18px;font-weight:700;margin:28px 0 14px;padding-left:10px;border-left:3px solid var(--action);}

    .badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
    .badge-card{background:var(--surface);border-radius:14px;padding:14px 12px;text-align:center;position:relative;transition:transform .15s,box-shadow .15s;}
    .badge-card.earned{box-shadow:0 4px 12px rgba(255,112,67,0.2);border:1.5px solid var(--action);}
    .badge-card.locked{opacity:0.55;filter:grayscale(.4);}
    .badge-card:hover{transform:translateY(-2px);}
    .badge-emoji{font-size:40px;display:block;margin-bottom:6px;}
    .badge-name{font-size:13px;font-weight:700;margin-bottom:2px;}
    .badge-desc{font-size:11px;color:var(--ink-500);margin-bottom:8px;min-height:28px;}
    .badge-progress{height:5px;background:var(--surface-2);border-radius:3px;overflow:hidden;margin-bottom:4px;}
    .badge-progress-fill{height:100%;background:var(--action);transition:width .5s;}
    .badge-progress-text{font-size:10px;color:var(--ink-500);}
    .badge-card.earned .badge-progress-fill{background:var(--brand);}

    .empty-hint{text-align:center;padding:40px 20px;color:var(--ink-500);background:var(--surface);border-radius:14px;font-size:14px;}
    .empty-hint a{color:var(--brand);text-decoration:none;font-weight:600;}

    .share-btn{background:var(--action);color:white;border:none;padding:12px 28px;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;margin-top:24px;box-shadow:var(--shadow-md);}
    .share-btn:hover{background:#F4511E;}

    #toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink-900);color:white;padding:12px 24px;border-radius:24px;font-size:14px;opacity:0;transition:opacity .2s,transform .2s;z-index:100;pointer-events:none;}
    #toast.show{opacity:.92;transform:translateX(-50%) translateY(0);}
  </style>
  <link rel="stylesheet" href="css/theme-dark.css?v=1">
  <script src="js/theme.js?v=1"></script>
</head>
<body>
<nav class="top-nav">
  <a class="back-link" href="/weekend-go/">← 周末去哪儿</a>
  <span style="font-size:15px;font-weight:700;">🏆 成就</span>
  <a class="back-link" href="/weekend-go/planner.html" style="font-size:13px;">🗺 规划</a>
</nav>

<div class="container">
  <header>
    <h1>🏆 成就图鉴</h1>
    <p>打卡越多，徽章越多。看看你收集了多少</p>
  </header>

  <div class="hero-stats" id="hero-stats"></div>

  <div id="earned-section"></div>
  <div id="progress-section"></div>
  <div id="all-section"></div>

  <div style="text-align:center;">
    <button class="share-btn" id="share-btn">📤 生成分享卡</button>
  </div>
</div>

<div id="toast"></div>

<script src="config/cities.js?v=achv"></script>
<script src="js/data.js"></script>
<script src="js/data-extra.js"></script>
<script src="js/data-extra2.js"></script>
<script src="js/data-beijing-500.js"></script>
<script src="js/data-beijing-expand.js"></script>
<script src="js/data-beijing-hidden.js"></script>
<script src="js/data-beijing-tales.js"></script>
<script src="js/data-beijing-new2026.js"></script>
<script src="js/data-shenzhen.js"></script>
<script src="js/data-weihai.js"></script>
<script src="js/data-suzhou.js" onerror="this.remove()"></script>
<script src="js/data-tianjin.js" onerror="this.remove()"></script>
<script src="js/data-qingdao.js" onerror="this.remove()"></script>
<script src="js/data-chengdu.js" onerror="this.remove()"></script>
<script src="js/data-hangzhou.js" onerror="this.remove()"></script>
<script src="js/data-chongqing.js" onerror="this.remove()"></script>
<script src="js/data-enshi.js" onerror="this.remove()"></script>
<script src="js/data-shared-cross-city.js?v=achv" onerror="this.remove()"></script>
<script src="js/achievements.js?v=1"></script>
<script>
(function(){
  function render() {
    const r = WG_Achievements.compute();
    // Hero
    document.getElementById('hero-stats').innerHTML = `
      <div class="hero-stat"><div class="hero-stat-num">${r.totalVisited}</div><div class="hero-stat-label">累计打卡</div></div>
      <div class="hero-stat"><div class="hero-stat-num">${r.citiesTouched}</div><div class="hero-stat-label">城市足迹</div></div>
      <div class="hero-stat"><div class="hero-stat-num">${r.streaks.longest}</div><div class="hero-stat-label">最长连击</div></div>
      <div class="hero-stat"><div class="hero-stat-num">${r.earned.length}</div><div class="hero-stat-label">已得徽章</div></div>
    `;

    if (r.totalVisited === 0) {
      document.getElementById('all-section').innerHTML = `
        <div class="empty-hint">还没打过卡。<a href="/weekend-go/">去主站</a>找几个地方玩，回来再看。</div>
      `;
      return;
    }

    function renderBadgeGrid(list) {
      return list.map(b => `
        <div class="badge-card ${b.earned ? 'earned' : (b.progress > 0 ? '' : 'locked')}">
          <span class="badge-emoji">${b.emoji}</span>
          <div class="badge-name">${b.name}</div>
          <div class="badge-desc">${b.desc}</div>
          <div class="badge-progress"><div class="badge-progress-fill" style="width:${Math.round(b.progress * 100)}%"></div></div>
          <div class="badge-progress-text">${b.progressText}${b.earned ? ' ✓' : ''}</div>
        </div>
      `).join('');
    }

    if (r.earned.length) {
      document.getElementById('earned-section').innerHTML = `
        <h2>✨ 已获得 (${r.earned.length})</h2>
        <div class="badge-grid">${renderBadgeGrid(r.earned)}</div>
      `;
    }

    if (r.nextUp.length) {
      document.getElementById('progress-section').innerHTML = `
        <h2>🎯 即将达成</h2>
        <div class="badge-grid">${renderBadgeGrid(r.nextUp)}</div>
      `;
    }

    const remaining = r.badges.filter(b => !b.earned && !r.nextUp.includes(b));
    if (remaining.length) {
      document.getElementById('all-section').innerHTML = `
        <h2>🔒 待解锁</h2>
        <div class="badge-grid">${renderBadgeGrid(remaining)}</div>
      `;
    }
  }

  function generateShareCanvas() {
    const r = WG_Achievements.compute();
    const W = 1080, H = 1920;
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, '#FFF8E1'); grad.addColorStop(1, '#FFF3E0');
    ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

    ctx.fillStyle = '#FF7043';
    ctx.fillRect(0,0,W,260);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 48px "PingFang SC", sans-serif';
    ctx.fillText('🏆 我的周末成就', 60, 110);
    ctx.font = '30px "PingFang SC", sans-serif';
    ctx.fillText(`打卡 ${r.totalVisited} 个 · ${r.citiesTouched} 城 · 连击 ${r.streaks.longest} 天`, 60, 170);

    // Earned badges in 3-col grid
    ctx.fillStyle = '#101828';
    ctx.font = 'bold 36px "PingFang SC", sans-serif';
    ctx.fillText(`✨ 已得 ${r.earned.length} 个徽章`, 60, 360);

    const cols = 3, cw = (W - 120) / cols;
    let y = 430;
    const topBadges = r.earned.slice(0, 12);
    topBadges.forEach((b, i) => {
      const col = i % cols, row = Math.floor(i / cols);
      const x = 60 + col * cw, yy = y + row * 180;
      ctx.fillStyle = '#FFFFFF';
      const rx = x + 20, rw = cw - 40, rh = 160;
      // rounded rect
      const r = 20;
      ctx.beginPath();
      ctx.moveTo(rx+r, yy);
      ctx.arcTo(rx+rw, yy, rx+rw, yy+rh, r);
      ctx.arcTo(rx+rw, yy+rh, rx, yy+rh, r);
      ctx.arcTo(rx, yy+rh, rx, yy, r);
      ctx.arcTo(rx, yy, rx+rw, yy, r);
      ctx.fill();
      ctx.fillStyle = '#101828';
      ctx.font = '64px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(b.emoji, rx + rw/2, yy + 80);
      ctx.font = 'bold 20px "PingFang SC", sans-serif';
      ctx.fillText(b.name, rx + rw/2, yy + 130);
      ctx.textAlign = 'left';
    });

    ctx.fillStyle = '#667085';
    ctx.font = '22px "PingFang SC", sans-serif';
    ctx.fillText('sherconan.github.io/weekend-go/achievements.html', 60, H - 60);

    c.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `WeekendGo-成就-${r.totalVisited}打卡.png`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 3000);
      toast('✓ 分享卡已下载');
    }, 'image/png');
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1800);
  }

  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(render, 100);
    document.getElementById('share-btn').addEventListener('click', generateShareCanvas);
  });
})();
</script>
</body>
</html>
