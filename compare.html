<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>周末去哪儿 · 对比</title>
  <meta name="description" content="3 个目的地横向并排对比距离/评分/预算/主题/季节/交通">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⚖️%3C/text%3E%3C/svg%3E">
  <style>
    :root{--ink-900:#101828;--ink-700:#344054;--ink-500:#667085;--ink-300:#98A2B3;--bg:#FAFBF8;--surface:#FFFFFF;--surface-2:#F6F8F4;--brand:#4CAF50;--action:#FF7043;--gold:#FFC107;--border:#E8ECF0;--shadow-sm:0 1px 3px rgba(16,24,40,.05);--shadow-md:0 4px 12px rgba(16,24,40,.08);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:"PingFang SC","Inter",-apple-system,sans-serif;background:var(--bg);color:var(--ink-900);line-height:1.5;-webkit-font-smoothing:antialiased;}
    .top-nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;}
    .back-link{color:var(--ink-700);text-decoration:none;font-size:14px;font-weight:600;}
    .title{font-size:15px;font-weight:700;}

    .container{max-width:1100px;margin:0 auto;padding:20px;}
    header{text-align:center;margin-bottom:24px;}
    header h1{font-size:26px;font-weight:800;margin-bottom:6px;}
    header p{color:var(--ink-500);font-size:13px;}

    /* picker */
    .picker{background:var(--surface);border-radius:16px;padding:16px;margin-bottom:20px;box-shadow:var(--shadow-sm);}
    .picker-label{font-size:13px;font-weight:700;color:var(--ink-700);margin-bottom:10px;}
    .picker-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;transition:border-color .15s;}
    .picker-input:focus{border-color:var(--action);}
    .picker-results{margin-top:10px;max-height:280px;overflow-y:auto;display:none;}
    .picker-results.open{display:block;}
    .picker-result-item{padding:10px 14px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:8px;}
    .picker-result-item:hover{background:var(--surface-2);}
    .picker-selected{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
    .picker-chip{background:var(--action);color:white;padding:5px 12px;border-radius:14px;font-size:12px;display:inline-flex;align-items:center;gap:5px;}
    .picker-chip-x{cursor:pointer;opacity:.8;}
    .picker-chip-x:hover{opacity:1;}

    /* compare table */
    .compare-wrap{overflow-x:auto;background:var(--surface);border-radius:16px;box-shadow:var(--shadow-sm);padding:4px;}
    .compare-table{border-collapse:separate;border-spacing:0;width:100%;min-width:600px;font-size:13px;}
    .compare-table th, .compare-table td{padding:12px 14px;text-align:left;vertical-align:top;border-bottom:1px solid var(--surface-2);}
    .compare-table th{background:var(--surface-2);color:var(--ink-500);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;position:sticky;left:0;z-index:1;width:110px;}
    .compare-table td{background:var(--surface);}
    .compare-table tr:last-child th, .compare-table tr:last-child td{border-bottom:none;}
    .compare-table tr.highlight td{background:#FFF8E1;}
    .dest-header{padding:12px 14px !important;background:linear-gradient(135deg,#FF7043 0%,#F4511E 100%) !important;color:white !important;text-align:center;}
    .dest-header .name{font-size:16px;font-weight:800;margin-bottom:2px;}
    .dest-header .sub{font-size:11px;opacity:.9;}
    .cell-multi{display:flex;flex-direction:column;gap:4px;font-size:12px;}
    .best{color:var(--brand);font-weight:700;}
    .chip{display:inline-block;padding:2px 8px;background:var(--surface-2);border-radius:10px;font-size:11px;color:var(--ink-700);margin:1px 2px;}

    .empty{text-align:center;padding:60px 20px;color:var(--ink-500);}
    .empty h2{font-size:20px;color:var(--ink-900);margin-bottom:8px;}

    #toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink-900);color:white;padding:12px 24px;border-radius:24px;font-size:14px;opacity:0;transition:opacity .2s,transform .2s;z-index:100;pointer-events:none;}
    #toast.show{opacity:.92;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>
<nav class="top-nav">
  <a class="back-link" href="/weekend-go/">← 周末去哪儿</a>
  <span class="title">⚖️ 对比</span>
  <a class="back-link" href="/weekend-go/planner.html" style="font-size:13px;">🗺 规划器</a>
</nav>

<div class="container">
  <header>
    <h1>⚖️ 目的地对比</h1>
    <p>最多选 3 个，横向对比距离 / 评分 / 预算 / 主题 / 季节 / 交通</p>
  </header>

  <div class="picker">
    <div class="picker-label">搜索并添加目的地 <span style="color:var(--ink-500);font-weight:400;" id="picker-counter">(0/3)</span></div>
    <input type="search" class="picker-input" id="picker-input" placeholder="输入名字，如 故宫 / 西湖 / 崂山..." autocomplete="off">
    <div class="picker-results" id="picker-results"></div>
    <div class="picker-selected" id="picker-selected"></div>
  </div>

  <div id="compare-container"></div>
</div>

<div id="toast"></div>

<script src="config/cities.js?v=compare"></script>
<script src="js/data.js"></script>
<script src="js/data-extra.js"></script>
<script src="js/data-extra2.js"></script>
<script src="js/data-beijing-500.js"></script>
<script src="js/data-beijing-expand.js"></script>
<script src="js/data-beijing-hidden.js"></script>
<script src="js/data-beijing-tales.js"></script>
<script src="js/data-beijing-new2026.js"></script>
<script src="js/data-shenzhen.js"></script>
<script src="js/data-weihai.js"></script>
<script src="js/data-suzhou.js" onerror="this.remove()"></script>
<script src="js/data-tianjin.js" onerror="this.remove()"></script>
<script src="js/data-qingdao.js" onerror="this.remove()"></script>
<script src="js/data-chengdu.js" onerror="this.remove()"></script>
<script src="js/data-hangzhou.js" onerror="this.remove()"></script>
<script src="js/data-shared-cross-city.js?v=compare" onerror="this.remove()"></script>
<script src="js/images.js?v=compare" onerror="this.remove()"></script>
<script src="js/compare.js?v=1"></script>
</body>
</html>
