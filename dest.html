<head>

  <style>
    :root{--ink-900:#101828;--ink-700:#344054;--ink-500:#667085;--ink-300:#98A2B3;--bg:#FAFBF8;--surface:#FFFFFF;--surface-2:#F6F8F4;--brand:#4CAF50;--action:#FF7043;--gold:#FFC107;--border:#E8ECF0;--shadow-sm:0 1px 3px rgba(16,24,40,.05);--shadow-md:0 4px 12px rgba(16,24,40,.08);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:"PingFang SC","Inter",-apple-system,sans-serif;background:var(--bg);color:var(--ink-900);line-height:1.6;-webkit-font-smoothing:antialiased;}
    .top-nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;}
    .back-link{color:var(--ink-700);text-decoration:none;font-size:14px;font-weight:600;}
    .share-btn{background:var(--brand);color:white;border:none;padding:6px 16px;border-radius:18px;font-size:13px;cursor:pointer;font-weight:600;}
    .share-btn:hover{background:#43a047;}

    .hero{height:280px;background-size:cover;background-position:center;position:relative;display:flex;align-items:flex-end;padding:24px 20px;color:white;text-shadow:0 2px 8px rgba(0,0,0,.4);}
    .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,.55) 100%);pointer-events:none;}
    .hero-content{position:relative;z-index:1;}
    .hero-city{font-size:14px;opacity:.9;margin-bottom:4px;}
    .hero-title{font-size:32px;font-weight:800;margin-bottom:4px;line-height:1.2;}
    .hero-sub{font-size:15px;opacity:.95;}

    .container{max-width:720px;margin:0 auto;padding:20px;}
    .meta-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding:16px;background:var(--surface);border-radius:16px;box-shadow:var(--shadow-sm);font-size:13px;}
    .meta-row > div{display:inline-flex;align-items:center;gap:4px;color:var(--ink-700);}
    .meta-row-lbl{color:var(--ink-500);font-size:12px;}
    .rating-pill{display:inline-flex;align-items:center;gap:4px;background:var(--gold);color:var(--ink-900);padding:4px 10px;border-radius:14px;font-weight:700;}

    .tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
    .tag{background:var(--surface);padding:5px 12px;border-radius:14px;font-size:12px;color:var(--ink-700);box-shadow:var(--shadow-sm);}
    .tag.theme{background:var(--action);color:white;}

    .section{background:var(--surface);border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm);}
    .section h2{font-size:17px;font-weight:700;margin-bottom:12px;padding-left:10px;border-left:3px solid var(--action);}
    .section p, .section .body{color:var(--ink-700);font-size:14px;white-space:pre-wrap;}
    .description{font-size:16px;color:var(--ink-900);line-height:1.7;font-weight:500;font-style:italic;border-left:3px solid var(--brand);padding:4px 16px;background:var(--surface-2);border-radius:8px;margin-bottom:16px;}

    .kv{display:grid;grid-template-columns:100px 1fr;gap:8px 12px;font-size:14px;}
    .kv dt{color:var(--ink-500);font-size:13px;}
    .kv dd{color:var(--ink-900);}

    .legends-list .legend-item{padding:12px 0;border-bottom:1px dashed var(--border);}
    .legends-list .legend-item:last-child{border-bottom:none;}
    .legend-title{font-weight:700;margin-bottom:4px;font-size:14px;}
    .legend-vibe{color:var(--action);font-size:12px;margin-bottom:4px;}
    .legend-body{color:var(--ink-700);font-size:13px;line-height:1.6;}

    .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
    .related-card{background:var(--surface);border-radius:14px;padding:14px;text-decoration:none;color:inherit;transition:transform .15s,box-shadow .15s;display:block;box-shadow:var(--shadow-sm);}
    .related-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
    .related-name{font-weight:700;margin-bottom:3px;font-size:14px;}
    .related-sub{font-size:12px;color:var(--ink-500);margin-bottom:6px;}
    .related-meta{font-size:11px;color:var(--ink-500);display:flex;gap:8px;}

    .error-state{text-align:center;padding:40px 20px;color:var(--ink-500);}
    .error-state h1{font-size:22px;margin-bottom:8px;color:var(--ink-900);}

    #toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink-900);color:white;padding:12px 24px;border-radius:24px;font-size:14px;opacity:0;transition:opacity .2s,transform .2s;z-index:100;pointer-events:none;}
    #toast.show{opacity:.92;transform:translateX(-50%) translateY(0);}

    @media(max-width:600px){.hero{height:220px;padding:20px 16px;}.hero-title{font-size:26px;}.container{padding:16px;}.kv{grid-template-columns:80px 1fr;}}
  </style>
  <link rel="stylesheet" href="css/theme-dark.css?v=1">
  <script src="js/theme.js?v=1"></script>
</head>
